<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Hippo Journal - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>

    <div class="login-container">

        <div class="left-side">
            <div class="form-box">
                <h2>Welcome Back</h2>
                <p>Log in to your private journal</p>

                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>

                    <button type="submit" class="auth-btn">Log In</button>
                </form>

                <p class="toggle-text">Don't have an account? <a href="#" id="go-to-signup">Sign Up</a></p>
            </div>
        </div>

        <div class="right-side">
            <div class="journal-graphic">
                <div class="journal-spine"></div>
                <div class="journal-cover">
                    <span class="journal-title">My Journal</span>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="theme.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Hippo Journal - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>

    <div class="login-container">

        <div class="left-side">
            <div class="form-box">
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Log in to your private journal</p>

                <form id="auth-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>

                    <div class="input-group" id="confirm-password-group" style="display: none;">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="Confirm your password">
                    </div>

                    <button type="submit" id="submit-btn" class="auth-btn">Log In</button>
                </form>

                <p class="toggle-text" id="toggle-container">
                    Don't have an account? <a href="#" id="switch-auth-mode">Sign Up</a>
                </p>
            </div>
        </div>

        <div class="right-side">
            <div class="journal-graphic">
                <div class="journal-spine"></div>
                <div class="journal-cover">
                    <span class="journal-title">My Journal</span>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="theme.js"></script>
    <script type="module" src="auth.js"></script>

</body>

</html>
